<!-- Barra superior de la página con título "Contacto" -->
<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Contacto
    </ion-title>
  </ion-toolbar>
</ion-header>

<!-- Área general donde se muestra todo el contenido de la página -->
<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Contacto</ion-title>
    </ion-toolbar>
  </ion-header>

  <!-- De la misma manera que las plantillas anteriores, organiza el contenido en filas y columnas -->
  <ion-grid>
    <ion-row>
      
      <!-- Columna adaptable al tamaño de la página -->
      <ion-col size="12" size-md="10" offset-md="1" size-lg="8" offset-lg="2" size-xl="6" offset-xl="3">
        
        <ion-card>
          <ion-card-header>
            <ion-card-title>Mis medios de contacto</ion-card-title>
          </ion-card-header>
          <ion-list>
            
            <!-- Este componente recorre la lista de medios de contacto y expone cada uno como un "item"  -->
            <ion-item *ngFor="let medio of mediosContacto">
            
              <!-- Habilita y muestra un ícono el cual cambia de acuerdo al medio (correo, teléfono, etc) -->
              <ion-icon slot="start" [name]="medio.icono"></ion-icon>
              <ion-label>
                
                <!-- Organización de etiqueta arriba y el valor correspondiente debajo -->
                <h3>{{ medio.etiqueta }}</h3>
                <p>{{ medio.valor }}</p>
              </ion-label>
            </ion-item>
          </ion-list>
        </ion-card>

        <h2 class="ion-padding-start ion-margin-top" style="font-weight: 600; color: var(--ion-color-medium);">¿Quieres escribirme?</h2>

        <ion-card>
          <ion-card-header>
            <ion-card-title>Envíame un mensaje</ion-card-title>
          </ion-card-header>
          <ion-list>
            <ion-item>
              
              <!--
                Crea el campo de texto para el input del nombre.
                Está conectado a la variable "nombre" del componente con "ngModel".
              -->
              <ion-input
                label="Nombre"
                labelPlacement="floating"
                type="text"
                [(ngModel)]="nombre"
                placeholder="Ingrese su nombre">
              </ion-input>
            </ion-item>

            <ion-item>
              
              <!--
                Crea el campo de texto para el input del correo electrónico.
                Está conectado a la variable "correo".
                El 'type="email"' valida el formato y habilita el teclado de
                correo electrónico en el móvil.
              -->
              <ion-input
                label="Correo electrónico"
                labelPlacement="floating"
                type="email"
                [(ngModel)]="correo"
                placeholder="Ingrese su correo">
              </ion-input>
            </ion-item>

            <ion-item>
              
              <!--
                Proporciona el área grande de texto para el mensaje.
                Puede crecer automáticamente al escribir y empieza con 4 filas.
              -->
              <ion-textarea
                label="Mensaje"
                labelPlacement="floating"
                [(ngModel)]="mensaje"
                placeholder="Escriba su mensaje"
                [autoGrow]="true"
                rows="4">
              </ion-textarea>
            </ion-item>
          </ion-list>

          <div class="ion-padding">
            
            <!-- Un botón que ocupa todo el ancho y llama a la función "enviarMensaje()" al hacer clic en él -->
            <ion-button expand="block" (click)="enviarMensaje()">
              Enviar
            </ion-button>
          </div>
        </ion-card>

      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
