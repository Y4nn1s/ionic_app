<!-- TODO: comentar -->
<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Información personal
    </ion-title>
  </ion-toolbar>
</ion-header>

<!-- TODO: comentar -->
<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Información personal</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="avatar-container">
    <!-- TODO: comentar -->
    <ion-avatar>
      <img alt="Avatar del estudiante" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
    </ion-avatar>
    <!-- TODO: comentar -->
    <h2>{{ datosPersonales[0].valor }}</h2>
  </div>

  <!-- TODO: comentar -->
  <ion-list>
    <ion-item *ngFor="let dato of datosPersonales">
      <ion-icon [name]="dato.icono" slot="start"></ion-icon>
      <ion-label>
        <h3>{{ dato.etiqueta }}</h3>
        <p>{{ dato.valor }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
